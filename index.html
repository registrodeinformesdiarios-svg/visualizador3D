<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js CAD Viewer (Draco Support)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background-color: #1a1a1a; color: white; font-family: ui-sans-serif, system-ui, sans-serif; }
        canvas { display: block; outline: none; }
        #drop-zone {
            transition: all 0.3s ease;
            border: 2px dashed #444;
        }
        #drop-zone.dragover {
            border-color: #3b82f6;
            background-color: rgba(59, 130, 246, 0.1);
        }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>

    <!-- UI Overlay -->
    <div id="ui-container" class="fixed inset-0 pointer-events-none z-10 flex flex-col">
        <!-- Header -->
        <header class="p-6 flex justify-between items-start">
            <div class="pointer-events-auto">
                <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">
                    SolidWorks Web Viewer
                </h1>
                <p class="text-gray-400 text-sm">Soporte para compresión Draco activado</p>
            </div>
            
            <div id="part-info" class="glass p-4 rounded-xl w-72 pointer-events-auto hidden transform transition-all duration-300 translate-x-0">
                <h2 class="text-blue-400 font-semibold mb-1 uppercase text-xs tracking-wider">Componente Seleccionado</h2>
                <div id="part-name" class="text-lg font-medium truncate mb-2 text-white">Ninguno</div>
                <div class="grid grid-cols-2 gap-2 text-xs">
                    <div class="text-gray-400">Tipo: <span id="part-type" class="text-gray-200">Mesh</span></div>
                    <div class="text-gray-400">Materiales: <span id="part-mat" class="text-gray-200">1</span></div>
                </div>
            </div>
        </header>

        <!-- Drop Zone (Central) -->
        <div id="drop-container" class="flex-1 flex items-center justify-center p-10">
            <div id="drop-zone" class="pointer-events-auto w-full max-w-md p-10 rounded-2xl flex flex-col items-center justify-center text-center cursor-pointer">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-gray-500 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                </svg>
                <p class="text-lg font-medium">Arrastra tu archivo .glb aquí</p>
                <p class="text-sm text-gray-500 mt-2">Compatible con archivos comprimidos de SolidWorks</p>
                <input type="file" id="file-input" class="hidden" accept=".glb,.gltf">
            </div>
        </div>

        <!-- Footer Instructions -->
        <footer class="p-6 flex justify-center">
            <div class="glass px-4 py-2 rounded-full text-xs text-gray-300 flex space-x-4">
                <span>🖱️ Click Izq: Rotar</span>
                <span>🖱️ Click Der: Desplazar</span>
                <span>🖱️ Rueda: Zoom</span>
                <span>🖱️ Click Simple: Info Pieza</span>
            </div>
        </footer>
    </div>

    <!-- WebGL Container -->
    <div id="container" class="absolute inset-0"></div>

    <!-- Scripts -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, controls, raycaster, mouse;
        let currentModel = null;

        const container = document.getElementById('container');
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const partInfo = document.getElementById('part-info');
        const partNameDisplay = document.getElementById('part-name');
        const partTypeDisplay = document.getElementById('part-type');
        const partMatDisplay = document.getElementById('part-mat');

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x111111);
            scene.fog = new THREE.Fog(0x111111, 15, 60);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(8, 8, 8);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.toneMapping = THREE.ReinhardToneMapping;
            container.appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
            dirLight.position.set(10, 20, 10);
            scene.add(dirLight);

            const grid = new THREE.GridHelper(30, 30, 0x333333, 0x222222);
            grid.position.y = -2;
            scene.add(grid);

            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            window.addEventListener('resize', onWindowResize);
            renderer.domElement.addEventListener('pointerdown', onDocumentMouseDown);
            
            dropZone.addEventListener('click', () => fileInput.click());
            fileInput.addEventListener('change', handleFileSelect);
            window.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
            window.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
            window.addEventListener('drop', handleDrop);
        }

        function handleDrop(e) {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file) loadModel(URL.createObjectURL(file));
        }

        function handleFileSelect(e) {
            const file = e.target.files[0];
            if (file) loadModel(URL.createObjectURL(file));
        }

        function loadModel(url) {
            const loader = new GLTFLoader();
            
            // --- CONFIGURACIÓN DRACO ---
            const dracoLoader = new DRACOLoader();
            // Usamos el decodificador de los servidores de Google (o un CDN de Three.js)
            dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.7/');
            loader.setDRACOLoader(dracoLoader);
            // ---------------------------

            dropZone.querySelector('p').innerText = "Descomprimiendo y cargando...";
            
            loader.load(url, (gltf) => {
                if (currentModel) scene.remove(currentModel);
                
                currentModel = gltf.scene;
                
                const box = new THREE.Box3().setFromObject(currentModel);
                const size = box.getSize(new THREE.Vector3());
                const center = box.getCenter(new THREE.Vector3());
                
                const maxDim = Math.max(size.x, size.y, size.z);
                const scale = 8 / maxDim;
                currentModel.scale.setScalar(scale);
                
                currentModel.position.x = -center.x * scale;
                currentModel.position.y = -center.y * scale;
                currentModel.position.z = -center.z * scale;

                scene.add(currentModel);
                
                document.getElementById('drop-container').style.display = 'none';
                dropZone.querySelector('p').innerText = "Arrastra tu archivo .glb aquí";
                
                // Limpiar el cargador Draco de memoria una vez usado
                dracoLoader.dispose();
            }, 
            (xhr) => {
                if (xhr.lengthComputable) {
                    const percent = (xhr.loaded / xhr.total * 100);
                    dropZone.querySelector('p').innerText = `Cargando: ${Math.round(percent)}%`;
                }
            },
            (error) => {
                console.error(error);
                dropZone.querySelector('p').innerText = "Error: Verifica que el archivo sea un GLB válido.";
            });
        }

        function onDocumentMouseDown(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(scene.children, true);

            if (intersects.length > 0) {
                let object = intersects[0].object;
                let name = object.name || object.parent.name || "Componente";
                
                // Formateo de nombre de SolidWorks
                name = name.split('_')[0].split('<')[0];

                showPartInfo(name, object);
                highlightObject(object);
            } else {
                partInfo.classList.add('hidden');
            }
        }

        function showPartInfo(name, obj) {
            partInfo.classList.remove('hidden');
            partNameDisplay.innerText = name;
            partTypeDisplay.innerText = obj.type;
            partMatDisplay.innerText = Array.isArray(obj.material) ? obj.material.length : 1;
        }

        let lastSelected = null;
        function highlightObject(obj) {
            if (lastSelected && lastSelected.material) {
                const mats = Array.isArray(lastSelected.material) ? lastSelected.material : [lastSelected.material];
                mats.forEach(m => { if(m.emissive) m.emissive.setHex(0x000000) });
            }
            
            lastSelected = obj;
            if (obj.material) {
                const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
                mats.forEach(m => { if(m.emissive) m.emissive.setHex(0x222222) });
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (controls) controls.update();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
